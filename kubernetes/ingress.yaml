apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commercehub-ingress
  namespace: commercehub
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.commercehub.com
    secretName: commercehub-tls
  rules:
  - host: api.commercehub.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: commercehub-api
            port:
              number: 80
