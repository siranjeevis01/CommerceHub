app = "commercehub"
primary_region = "iad"

[build]

[deploy]
  release_command = "dotnet CommerceHub.Api.dll"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
