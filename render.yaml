  - type: web
    name: commercehub-analytics
    runtime: docker
    dockerfilePath: src/Services/Analytics/CommerceHub.Analytics.Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
