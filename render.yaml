    autoDeploy: true

  - type: web
    name: commercehub-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: API_BASE_URL
        value: https://commercehub-gateway.onrender.com
    autoDeploy: true
