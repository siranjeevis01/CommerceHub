services:
  - type: web
    name: commercehub-api
    runtime: docker
    dockerfilePath: src/CommerceHub.Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        sync: false
      - key: JWT_ISSUER
        value: CommerceHub
      - key: JWT_AUDIENCE
        value: CommerceHubClient
      - key: ALLOWED_ORIGINS
        value: "https://commercehub-siranjeevis01.web.app,https://commercehub-admin.web.app"
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_USER
        sync: false
      - key: RABBITMQ_PASS
        sync: false
      - key: RABBITMQ_VHOST
        value: "/"
      - key: REDIS_CONNECTION_STRING
        sync: false
      - key: IDENTITY_DB_CONNECTION
        sync: false
      - key: PRODUCT_DB_CONNECTION
        sync: false
      - key: ORDER_DB_CONNECTION
        sync: false
      - key: PAYMENT_DB_CONNECTION
        sync: false
      - key: VENDOR_DB_CONNECTION
        sync: false
      - key: INVENTORY_DB_CONNECTION
        sync: false
      - key: CMS_DB_CONNECTION
        sync: false
      - key: AI_DB_CONNECTION
        sync: false
      - key: ANALYTICS_DB_CONNECTION
        sync: false
      - key: NOTIFICATION_DB_CONNECTION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_MERCHANT_NAME
        value: CommerceHub
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
    healthCheckPath: /health
    autoDeploy: true
