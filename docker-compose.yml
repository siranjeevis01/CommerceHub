services:
  mysql:
    image: mysql:8.0
    container_name: commercehub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: commercehub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - commercehub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: commercehub-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - commercehub-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: commercehub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - commercehub-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: commercehub-postgres
    environment:
      POSTGRES_DB: commercehub_analytics
      POSTGRES_USER: commercehub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commercehub-network

  commercehub-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: commercehub-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - IDENTITY_DB_CONNECTION=server=mysql;database=commercehub_identity;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - PRODUCT_DB_CONNECTION=server=mysql;database=commercehub_products;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - ORDER_DB_CONNECTION=server=mysql;database=commercehub_orders;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - PAYMENT_DB_CONNECTION=server=mysql;database=commercehub_payments;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - VENDOR_DB_CONNECTION=server=mysql;database=commercehub_vendors;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - INVENTORY_DB_CONNECTION=server=mysql;database=commercehub_inventory;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - CMS_DB_CONNECTION=server=mysql;database=commercehub_cms;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - AI_DB_CONNECTION=server=mysql;database=commercehub_ai;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - NOTIFICATION_DB_CONNECTION=server=mysql;database=commercehub_notification;user=root;password=${DB_ROOT_PASSWORD:-rootpassword}
      - ANALYTICS_DB_CONNECTION=Host=postgres;Database=commercehub_analytics;Username=commercehub;Password=${POSTGRES_PASSWORD:-postgrespass}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - UPI_ID=${UPI_ID:-}
      - UPI_MERCHANT_NAME=${UPI_MERCHANT_NAME:-CommerceHub}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD:-redispass}
      - JWT_KEY=${JWT_KEY:-supersecretkeythatmustbe32byteslong}
      - JWT_ISSUER=CommerceHub
      - JWT_AUDIENCE=CommerceHubClient
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@commercehub.com}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - commercehub-network
    restart: always

  commercehub-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commercehub-web
    ports:
      - "4200:8080"
    depends_on:
      - commercehub-api
    networks:
      - commercehub-network

  commercehub-mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: commercehub-mobile
    ports:
      - "8100:8080"
    depends_on:
      - commercehub-api
    networks:
      - commercehub-network

networks:
  commercehub-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  postgres_data:
