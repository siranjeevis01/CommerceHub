<div class="page-header">
  <h1>Reviews</h1>
</div>

<div class="filters-bar">
  <select class="form-select" style="width:120px" (change)="onRatingFilter($any($event.target).value)">
    <option value="">All Ratings</option>
    <option value="5">5 Stars</option>
    <option value="4">4 Stars</option>
    <option value="3">3 Stars</option>
    <option value="2">2 Stars</option>
    <option value="1">1 Star</option>
  </select>
  <select class="form-select" style="width:140px" (change)="onStatusFilter($any($event.target).value)">
    <option value="">All Status</option>
    <option value="approved">Approved</option>
    <option value="pending">Pending</option>
  </select>
</div>

<app-loading-overlay [show]="loading"></app-loading-overlay>

<div class="card" *ngIf="reviews$ | async as response">
  <div class="card-body p-0">
    <div class="list-group list-group-flush">
      <div class="list-group-item p-4" *ngFor="let review of response.data">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <div class="fw-semibold">{{ review.userName }}</div>
            <div class="stars mb-1">
              <span *ngFor="let s of [1,2,3,4,5]" [class.star-empty]="s > review.rating">★</span>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <app-status-badge [status]="review.isApproved ? 'approved' : 'pending'"></app-status-badge>
            <small class="text-muted">{{ review.createdAt | date:'MMM d, y' }}</small>
          </div>
        </div>
        <div class="mb-2">
          <a routerLink="/products/{{ review.productId }}" class="text-primary small">Product #{{ review.productId }}</a>
        </div>
        <p class="mb-2">{{ review.comment }}</p>

        <div *ngIf="replyingTo === review.id" class="reply-section">
          <textarea class="form-control mb-2" rows="3" placeholder="Write your reply..."
                    [(ngModel)]="replyText[review.id]"></textarea>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-primary" (click)="submitReply(review.id)">Send Reply</button>
            <button class="btn btn-sm btn-outline-secondary" (click)="cancelReply()">Cancel</button>
          </div>
        </div>
        <div *ngIf="replyingTo !== review.id">
          <button class="btn btn-sm btn-outline-primary" (click)="startReply(review.id)">
            <i class="bi bi-reply"></i> Reply
          </button>
        </div>
      </div>

      <div class="list-group-item p-4 text-center" *ngIf="response.data.length === 0">
        <app-empty-state icon="star" title="No reviews yet" message="Customer reviews will appear here once they start reviewing your products."></app-empty-state>
      </div>
    </div>
  </div>

  <div class="table-footer" *ngIf="response.total > response.pageSize">
    <div class="table-info">Page {{ page }} of {{ response.totalPages }}</div>
    <nav>
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item" [class.disabled]="page <= 1"><a class="page-link" (click)="onPageChange(page - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of getPages(response.totalPages)" [class.active]="p === page"><a class="page-link" (click)="onPageChange(p)">{{ p }}</a></li>
        <li class="page-item" [class.disabled]="page >= response.totalPages"><a class="page-link" (click)="onPageChange(page + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
