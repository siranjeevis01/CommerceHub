<div class="table-container">
  <div class="table-wrapper" *ngIf="!loading; else loadingTpl">
    <table class="table" *ngIf="data.length > 0; else emptyTpl">
      <thead>
        <tr>
          <th *ngIf="selectable" class="select-col">
            <input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll()">
          </th>
          <th *ngFor="let col of columns" [style.width]="col.width" [class.sortable]="col.sortable"
              (click)="col.sortable && sort(col.key)">
            {{ col.label }}
            <span class="sort-indicator" *ngIf="col.sortable && sortKey === col.key">
              {{ sortDir === 'asc' ? '▲' : '▼' }}
            </span>
          </th>
          <th *ngIf="actionsTemplate" class="actions-col">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of data" (click)="onRowClick($event, row)">
          <td *ngIf="selectable">
            <input type="checkbox" [checked]="isSelected(row.id)" (change)="toggleSelect(row.id)">
          </td>
          <td *ngFor="let col of columns">{{ row[col.key] }}</td>
          <td *ngIf="actionsTemplate" class="actions-col">
            <ng-container [ngTemplateOutlet]="actionsTemplate" [ngTemplateOutletContext]="{ $implicit: row }"></ng-container>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #emptyTpl>
      <div class="empty-state">
        <div class="empty-icon"><i class="bi bi-{{ emptyIcon }}"></i></div>
        <h3>{{ emptyMessage }}</h3>
      </div>
    </ng-template>
  </div>
  <ng-template #loadingTpl>
    <div class="loading-overlay"><div class="spinner"></div></div>
  </ng-template>

  <div class="table-footer" *ngIf="total > 0">
    <div class="table-info">
      Showing {{ ((page - 1) * pageSize) + 1 }}-{{ Math.min(page * pageSize, total) }} of {{ total }}
      <span *ngIf="selectedIds.size > 0"> | {{ selectedIds.size }} selected</span>
    </div>
    <nav class="pagination-nav" *ngIf="totalPages > 1">
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item" [class.disabled]="page === 1">
          <a class="page-link" (click)="onPageChange(page - 1)">‹</a>
        </li>
        <li class="page-item" *ngFor="let p of getPages()" [class.active]="p === page" [class.disabled]="p === '...'">
          <a class="page-link" (click)="onPageChange(+p)">{{ p }}</a>
        </li>
        <li class="page-item" [class.disabled]="page === totalPages">
          <a class="page-link" (click)="onPageChange(page + 1)">›</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
