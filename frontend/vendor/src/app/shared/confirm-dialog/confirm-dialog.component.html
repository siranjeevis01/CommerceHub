<div class="modal-backdrop" *ngIf="show" (click)="cancel.emit()"></div>
<div class="confirm-dialog" *ngIf="show" role="dialog">
  <div class="confirm-content">
    <div class="confirm-icon">
      <i class="bi bi-{{ icon }}"></i>
    </div>
    <h4 class="confirm-title">{{ title }}</h4>
    <p class="confirm-message">{{ message }}</p>
    <div class="confirm-actions">
      <button class="btn btn-outline-secondary" (click)="cancel.emit()">{{ cancelText }}</button>
      <button class="btn {{ confirmClass }}" (click)="confirm.emit()">{{ confirmText }}</button>
    </div>
  </div>
</div>
