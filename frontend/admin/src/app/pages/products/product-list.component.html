<div class="fade-in">
  <div class="page-header">
    <div>
      <h1>Products</h1>
      <p>Manage all products across the marketplace</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-success btn-sm" *ngIf="selectedProducts.length > 0" (click)="bulkToggle(true)">
        Activate ({{ selectedProducts.length }})
      </button>
      <button class="btn btn-outline-warning btn-sm" *ngIf="selectedProducts.length > 0" (click)="bulkToggle(false)">
        Deactivate ({{ selectedProducts.length }})
      </button>
      <a class="btn btn-primary" routerLink="/products/create">
        <i class="bi bi-plus-lg"></i> Add Product
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <app-data-table
        [columns]="columns"
        [data]="products"
        [total]="total"
        [page]="page"
        [pageSize]="pageSize"
        [loading]="loading"
        [error]="error"
        [actions]="actions"
        [filters]="filters"
        [selectable]="true"
        sortKey="createdAt"
        sortDir="desc"
        emptyMessage="No products found"
        (pageChange)="onPageChange($event)"
        (sortChange)="onSortChange($event)"
        (filterChange)="onFilterChange($event)"
        (selectionChange)="onSelectionChange($event)"
        (rowClick)="router.navigate(['/products', $event.id, 'edit'])"
      >
        <ng-template let-row>
          <span [class]="getStockLevel(row).class" style="font-size:12px;font-weight:500">
            <i class="bi bi-circle-fill me-1" style="font-size:8px"></i>{{ getStockLevel(row).label }} ({{ row.stockQuantity }})
          </span>
        </ng-template>
      </app-data-table>
    </div>
  </div>
</div>
