<div class="fade-in">
  <nav class="breadcrumb-nav">
    <a routerLink="/cms">CMS</a>
    <span class="separator">/</span>
    <span class="current">{{ page?.title || 'Editor' }}</span>
  </nav>

  <div class="loading-spinner" *ngIf="loading"><div class="spinner-border" role="status"></div></div>
  <div class="error-state" *ngIf="error">
    <i class="bi bi-exclamation-triangle-fill"></i><p>{{ error }}</p>
    <button class="btn btn-primary" (click)="retry()">Retry</button>
  </div>

  <ng-container *ngIf="page && !loading && !error">
    <div class="page-header">
      <h1>Edit: {{ page.title }}</h1>
      <div class="d-flex gap-2">
        <div class="form-check form-switch d-flex align-items-center">
          <input class="form-check-input me-2" type="checkbox" id="publishToggle" [(ngModel)]="isPublished">
          <label class="form-check-label" for="publishToggle">{{ isPublished ? 'Published' : 'Draft' }}</label>
        </div>
        <button class="btn btn-primary" (click)="save()" [disabled]="saving">
          <span class="spinner-border spinner-border-sm me-1" *ngIf="saving"></span>
          Save
        </button>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header"><h5>Page Content</h5></div>
      <div class="card-body">
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Title</label>
            <input class="form-control" [(ngModel)]="title" (input)="generateSlug()">
          </div>
          <div class="col-md-6">
            <label class="form-label">Slug</label>
            <div class="input-group">
              <span class="input-group-text">/</span>
              <input class="form-control" [(ngModel)]="slug">
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Content</label>
          <app-rich-text-editor [(value)]="content" (valueChange)="content = $event" [height]="'400px'"></app-rich-text-editor>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h5>SEO Settings</h5></div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Meta Title</label>
          <input class="form-control" [(ngModel)]="metaTitle" placeholder="SEO title">
        </div>
        <div class="mb-3">
          <label class="form-label">Meta Description</label>
          <textarea class="form-control" [(ngModel)]="metaDescription" rows="3" placeholder="SEO meta description"></textarea>
        </div>
      </div>
    </div>
  </ng-container>
</div>
