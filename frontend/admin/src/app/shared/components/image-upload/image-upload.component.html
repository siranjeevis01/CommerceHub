<div class="image-upload">
  <label class="upload-label" *ngIf="label">{{ label }}</label>

  <div class="preview-grid" *ngIf="images.length > 0">
    <div class="preview-item" *ngFor="let img of images; let i = index">
      <img [src]="img" [alt]="'Image ' + (i+1)" (error)="removeImage(i)">
      <button type="button" class="remove-btn" (click)="removeImage(i)" [disabled]="disabled">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <div class="upload-zone"
    [class.drag-over]="dragOver"
    [class.disabled]="disabled"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">
    <input type="file" [accept]="accept" [multiple]="multiple" (change)="onFileSelect($event)" [disabled]="disabled" #fileInput>
    <div class="upload-content">
      <i class="bi bi-cloud-arrow-up"></i>
      <p>Drag & drop or <span>browse</span> files</p>
      <small>Max {{ maxSize }}MB per file</small>
    </div>
  </div>

  <button type="button" class="btn btn-sm btn-outline-secondary mt-2" (click)="addUrl()" [disabled]="disabled">
    <i class="bi bi-link-45deg"></i> Add URL
  </button>
</div>
