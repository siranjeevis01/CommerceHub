<div class="stat-card" [ngClass]="'card-' + color">
  <div class="stat-loading" *ngIf="loading">
    <div class="placeholder-glow">
      <span class="placeholder col-8"></span>
      <span class="placeholder col-4"></span>
    </div>
  </div>
  <ng-container *ngIf="!loading">
    <div class="stat-header">
      <span class="stat-label">{{ label }}</span>
      <span class="stat-icon" *ngIf="icon">
        <i [ngClass]="icon"></i>
      </span>
    </div>
    <div class="stat-value">
      {{ prefix }}{{ displayValue }}{{ suffix }}
    </div>
    <div class="stat-footer" *ngIf="change !== 0">
      <span class="stat-change" [class.trend-up]="trend === 'up'" [class.trend-down]="trend === 'down'">
        <i [ngClass]="trend === 'up' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'"></i>
        {{ formattedChange }}
      </span>
      <span class="stat-period">{{ changeLabel }}</span>
    </div>
  </ng-container>
</div>
