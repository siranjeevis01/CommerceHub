<header class="admin-navbar">
  <div class="navbar-search">
    <i class="bi bi-search search-icon"></i>
    <input type="text" placeholder="Search products, orders, users..." [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()">
  </div>

  <div class="navbar-actions">
    <button class="btn-icon" title="Notifications">
      <i class="bi bi-bell"></i>
      <span class="badge-dot"></span>
    </button>
    <button class="btn-icon" title="Messages">
      <i class="bi bi-chat-dots"></i>
    </button>
    <button class="btn-icon" title="Full screen">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <div class="dropdown">
      <div class="user-menu" data-bs-toggle="dropdown">
        <span class="avatar">{{ userInitials }}</span>
        <div class="user-info d-none d-md-block">
          <div class="name">{{ auth.currentUser?.firstName }} {{ auth.currentUser?.lastName }}</div>
          <div class="role">{{ auth.currentUser?.roles?.[0] || 'Admin' }}</div>
        </div>
      </div>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" routerLink="/settings"><i class="bi bi-person"></i> Profile</a></li>
        <li><a class="dropdown-item" routerLink="/settings"><i class="bi bi-gear"></i> Settings</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" (click)="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</header>
