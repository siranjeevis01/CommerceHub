<div class="empty-state text-center py-5">
  <div class="empty-icon mb-3">
    <i class="bi {{icon}}"></i>
  </div>
  <h5 class="fw-semibold">{{title}}</h5>
  <p class="text-muted mb-0" *ngIf="message">{{message}}</p>
  <a *ngIf="actionLabel && actionLink" [routerLink]="actionLink" class="btn btn-primary mt-3">
    {{actionLabel}}
  </a>
</div>
