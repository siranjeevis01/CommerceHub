<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mt-4" *ngIf="totalPages > 0">
  <small class="text-muted">Showing {{startItem}}–{{endItem}} of {{total}} items</small>
  <nav *ngIf="totalPages > 1">
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" (click)="goTo(1)" aria-label="First">&laquo;&laquo;</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" (click)="goTo(currentPage - 1)" aria-label="Previous">&laquo;</a>
      </li>
      <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
        <a class="page-link" (click)="goTo(page)">{{page}}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" (click)="goTo(currentPage + 1)" aria-label="Next">&raquo;</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" (click)="goTo(totalPages)" aria-label="Last">&raquo;&raquo;</a>
      </li>
    </ul>
  </nav>
</div>
