<div class="data-table-wrapper">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0" [class.table-striped]="data.length > 0">
      <thead class="table-light">
        <tr>
          <th class="select-col" *ngIf="selectable" style="width: 48px;">
            <div class="form-check">
              <input class="form-check-input" type="checkbox"
                     [checked]="isAllSelected()"
                     (change)="toggleSelectAll()"
                     [disabled]="loading || data.length === 0">
            </div>
          </th>
          <th *ngFor="let col of columns"
              [style.width]="col.width"
              [class.text-center]="col.align === 'center'"
              [class.text-end]="col.align === 'end'"
              [class.sortable]="col.sortable"
              (click)="col.sortable && onSort(col.key)">
            <div class="d-flex align-items-center gap-1" [class.justify-content-center]="col.align === 'center'"
                 [class.justify-content-end]="col.align === 'end'">
              {{ col.label }}
              <span class="sort-indicator" *ngIf="col.sortable">
                <i class="bi bi-arrow-up" *ngIf="sortColumn === col.key && sortDirection === 'asc'"></i>
                <i class="bi bi-arrow-down" *ngIf="sortColumn === col.key && sortDirection === 'desc'"></i>
                <i class="bi bi-arrow-up text-muted opacity-25" *ngIf="sortColumn !== col.key"></i>
              </span>
            </div>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="loading">
          <td [attr.colspan]="columns.length + (selectable ? 1 : 0)" class="text-center py-5">
            <app-loading-spinner size="sm" text="Loading data..."></app-loading-spinner>
          </td>
        </tr>
        <tr *ngIf="!loading && data.length === 0">
          <td [attr.colspan]="columns.length + (selectable ? 1 : 0)" class="text-center py-5">
            <div class="text-muted">
              <i class="bi bi-inbox fs-2 d-block mb-2"></i>
              <span>{{ emptyMessage }}</span>
            </div>
          </td>
        </tr>
        <tr *ngFor="let item of data; trackBy: trackByFn"
            [class.selected]="selectedKeys.has(getCellValue(item, keyField))"
            [class.clickable]="rowClick.observed"
            (click)="rowClick.emit(item)">
          <td class="select-col" *ngIf="selectable" (click)="$event.stopPropagation()">
            <div class="form-check">
              <input class="form-check-input" type="checkbox"
                     [checked]="selectedKeys.has(getCellValue(item, keyField))"
                     (change)="toggleSelect(getCellValue(item, keyField))">
            </div>
          </td>
          <td *ngFor="let col of columns"
              [class.text-center]="col.align === 'center'"
              [class.text-end]="col.align === 'end'">
            <ng-container [ngSwitch]="col.template">
              <span *ngSwitchDefault>{{ getCellValue(item, col.key) }}</span>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2 p-3 border-top bg-light"
       *ngIf="total > 0">
    <small class="text-muted">
      Showing {{ startRecord }} - {{ endRecord }} of {{ total }}
    </small>
    <div class="d-flex align-items-center gap-2">
      <small class="text-muted">Rows per page:</small>
      <select class="form-select form-select-sm" style="width: auto;"
              [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)">
        <option *ngFor="let opt of pageSizeOptions" [value]="opt">{{ opt }}</option>
      </select>
    </div>
    <nav *ngIf="totalPages > 1">
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item" [class.disabled]="page === 1">
          <a class="page-link" href="#" (click)="$event.preventDefault(); onPage(1)" aria-label="First">
            <i class="bi bi-chevron-double-left"></i>
          </a>
        </li>
        <li class="page-item" [class.disabled]="page === 1">
          <a class="page-link" href="#" (click)="$event.preventDefault(); onPage(page - 1)" aria-label="Previous">
            <i class="bi bi-chevron-left"></i>
          </a>
        </li>
        <li class="page-item" *ngFor="let p of pages" [class.active]="p === page">
          <a class="page-link" href="#" (click)="$event.preventDefault(); onPage(p)">{{ p }}</a>
        </li>
        <li class="page-item" [class.disabled]="page === totalPages">
          <a class="page-link" href="#" (click)="$event.preventDefault(); onPage(page + 1)" aria-label="Next">
            <i class="bi bi-chevron-right"></i>
          </a>
        </li>
        <li class="page-item" [class.disabled]="page === totalPages">
          <a class="page-link" href="#" (click)="$event.preventDefault(); onPage(totalPages)" aria-label="Last">
            <i class="bi bi-chevron-double-right"></i>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</div>
