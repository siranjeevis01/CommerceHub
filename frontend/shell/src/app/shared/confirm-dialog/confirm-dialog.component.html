<div class="modal-backdrop fade show" *ngIf="show" (click)="onCancel()"></div>
<div class="modal d-block" tabindex="-1" *ngIf="show" role="dialog">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-body text-center py-4">
        <div class="icon-wrapper mb-3">
          <i class="bi {{ icon }} fs-1 text-warning"></i>
        </div>
        <h5 class="fw-semibold mb-2">{{ title }}</h5>
        <p class="text-muted small mb-0">{{ message }}</p>
      </div>
      <div class="modal-footer border-0 pt-0 justify-content-center gap-2">
        <button type="button" class="btn btn-light px-4" (click)="onCancel()">{{ cancelText }}</button>
        <button type="button" class="btn px-4 text-white" [class]="confirmClass" (click)="onConfirm()">{{ confirmText }}</button>
      </div>
    </div>
  </div>
</div>
