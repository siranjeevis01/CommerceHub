<div class="loading-container" [class.overlay]="overlay">
  <div class="d-flex flex-column align-items-center gap-2">
    <div class="spinner-border text-primary" [class.spinner-border-sm]="size === 'sm'"
         [ngStyle]="size === 'lg' ? { width: '3rem', height: '3rem' } : {}"
         role="status">
      <span class="visually-hidden">{{ text }}</span>
    </div>
    <span class="text-muted small" *ngIf="text">{{ text }}</span>
  </div>
</div>
