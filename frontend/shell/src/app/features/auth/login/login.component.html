<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <i class="bi bi-shop fs-1 text-primary"></i>
              <h3 class="fw-bold mt-2">Welcome Back</h3>
              <p class="text-muted small">Sign in to your CommerceHub account</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label small fw-medium">Email Address</label>
                <input type="email" class="form-control" id="email"
                       formControlName="email"
                       placeholder="you@example.com"
                       [class.is-invalid]="submitted && f['email'].errors">
                <div class="invalid-feedback" *ngIf="submitted && f['email'].errors?.['required']">
                  Email is required
                </div>
                <div class="invalid-feedback" *ngIf="submitted && f['email'].errors?.['email']">
                  Please enter a valid email
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label small fw-medium">Password</label>
                <div class="input-group">
                  <input [type]="showPassword ? 'text' : 'password'" class="form-control" id="password"
                         formControlName="password"
                         placeholder="Enter your password"
                         [class.is-invalid]="submitted && f['password'].errors">
                  <button class="btn btn-outline-secondary" type="button"
                          (click)="showPassword = !showPassword">
                    <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                  </button>
                  <div class="invalid-feedback" *ngIf="submitted && f['password'].errors?.['required']">
                    Password is required
                  </div>
                  <div class="invalid-feedback" *ngIf="submitted && f['password'].errors?.['minlength']">
                    Password must be at least 6 characters
                  </div>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="rememberMe"
                         formControlName="rememberMe">
                  <label class="form-check-label small" for="rememberMe">Remember me</label>
                </div>
                <a routerLink="/auth/forgot-password" class="small text-decoration-none">Forgot password?</a>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-medium" [disabled]="loading">
                <span class="spinner-border spinner-border-sm me-2" *ngIf="loading" role="status"></span>
                {{ loading ? 'Signing in...' : 'Sign In' }}
              </button>
            </form>

            <div class="divider my-4">
              <span class="text-muted small">or continue with</span>
            </div>

            <div class="d-grid gap-2">
              <button type="button" class="btn btn-outline-dark d-flex align-items-center justify-content-center gap-2 py-2"
                      (click)="loginWithGoogle()">
                <i class="bi bi-google"></i>
                <span class="small fw-medium">Google</span>
              </button>
              <button type="button" class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 py-2"
                      (click)="loginWithFacebook()">
                <i class="bi bi-facebook"></i>
                <span class="small fw-medium">Facebook</span>
              </button>
            </div>

            <p class="text-center text-muted small mt-4 mb-0">
              Don't have an account?
              <a routerLink="/auth/register" class="fw-medium">Sign up</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
