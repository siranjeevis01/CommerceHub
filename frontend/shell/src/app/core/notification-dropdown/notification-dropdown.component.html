<div class="dropdown-menu notification-dropdown show shadow-lg border-0" (click)="$event.stopPropagation()">
  <div class="dropdown-header d-flex justify-content-between align-items-center px-3 py-2">
    <h6 class="mb-0 fw-semibold">Notifications</h6>
    <button class="btn btn-sm btn-link text-decoration-none p-0" (click)="close.emit()">
      <i class="bi bi-x-lg fs-6"></i>
    </button>
  </div>

  <div class="notification-list" *ngIf="notifications.length > 0; else emptyState">
    <button class="dropdown-item notification-item px-3 py-2"
            *ngFor="let notif of notifications"
            (click)="navigateToOrder(notif.orderId)">
      <div class="d-flex align-items-start gap-2">
        <i [class]="getNotificationIcon(notif.type) + ' fs-5 mt-1'"></i>
        <div class="flex-grow-1 min-w-0">
          <p class="mb-0 fw-medium text-truncate">{{ notif.title }}</p>
          <small class="text-secondary text-truncate d-block">{{ notif.message }}</small>
          <small class="text-muted">{{ formatTimestamp(notif.timestamp) }}</small>
        </div>
      </div>
    </button>
  </div>

  <ng-template #emptyState>
    <div class="text-center py-4 px-3">
      <i class="bi bi-bell-slash fs-2 text-muted"></i>
      <p class="text-muted small mb-0 mt-2">No notifications yet</p>
    </div>
  </ng-template>

  <div class="dropdown-footer text-center border-top py-2">
    <a class="small text-decoration-none" href="#" (click)="$event.preventDefault(); close.emit()">
      Mark all as read
    </a>
  </div>
</div>
