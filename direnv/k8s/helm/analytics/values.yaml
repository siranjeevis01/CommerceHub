replicaCount: 3
image:
  repository: commercehub/analytics
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
env:
  ANALYTICS_DB_CONNECTION: "server=postgres;port=5432;database=commercehub_analytics;user id=postgres;password=postgres"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_USER: "guest"
  RABBITMQ_PASS: "guest"
