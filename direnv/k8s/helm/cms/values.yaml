replicaCount: 3
image:
  repository: commercehub/cms
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
env:
  CMS_DB_CONNECTION: "server=mysql;database=commercehub_cms;user=root;password=rootpassword"
  REDIS_CONNECTION_STRING: "redis:6379,password=redispass"
