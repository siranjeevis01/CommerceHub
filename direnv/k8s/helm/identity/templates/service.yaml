apiVersion: v1
kind: Service
metadata:
  name: {{ include "commercehub-identity.fullname" . }}-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "commercehub-identity.name" . }}
