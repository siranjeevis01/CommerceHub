replicaCount: 3

image:
  repository: commercehub/gateway
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  JWT_ISSUER: "CommerceHub"
  JWT_AUDIENCE: "CommerceHubClient"

ingress:
  enabled: true
  host: api.commercehub.com
  tls:
    enabled: true
    secretName: commercehub-tls
