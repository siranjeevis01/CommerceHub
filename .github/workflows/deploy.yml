name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering Render deploy..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Failed to trigger deploy (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy triggered successfully"

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build all MFEs
        working-directory: frontend
        run: npm run build:all

      - name: Verify MFE outputs
        working-directory: frontend
        run: |
          echo "=== Verifying MFE build outputs ==="
          for mfe in admin vendor storefront; do
            if [ -f "dist/$mfe/remoteEntry.js" ]; then
              echo "OK: dist/$mfe/remoteEntry.js exists"
            else
              echo "ERROR: dist/$mfe/remoteEntry.js MISSING"
              exit 1
            fi
          done
          if [ -f "dist/shell/index.html" ]; then
            echo "OK: dist/shell/index.html exists"
          else
            echo "ERROR: dist/shell/index.html MISSING"
            exit 1
          fi
          for mfe in admin vendor storefront; do
            if [ -f "dist/shell/$mfe/remoteEntry.js" ]; then
              echo "OK: dist/shell/$mfe/remoteEntry.js exists"
            else
              echo "ERROR: dist/shell/$mfe/remoteEntry.js MISSING"
              exit 1
            fi
          done
          echo "=== All verifications passed ==="
          echo "=== Shell dist contents ==="
          ls -la dist/shell/
          ls -la dist/shell/vendor/ 2>/dev/null || echo "No vendor dir"
          ls -la dist/shell/storefront/ 2>/dev/null || echo "No storefront dir"

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate and Deploy to Firebase
        working-directory: frontend
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json
          firebase deploy --only hosting --project commercehub-siranjeevis01
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json

  deploy-mobile-web:
    name: Deploy Mobile Web to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build mobile app
        working-directory: mobile
        run: npx ng build --configuration production

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate and Deploy Mobile to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json
          firebase deploy --only hosting --project commerce-mobile-siranjeevis01 --config firebase.mobile.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
