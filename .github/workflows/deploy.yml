name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v1.0.2
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://commercehub-siranjeevis01.web.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build:all
        env:
          NODE_ENV: production

      - name: Verify MFE outputs
        working-directory: frontend
        run: |
          echo "=== Verifying MFE build outputs ==="
          for mfe in admin vendor storefront; do
            if [ -f "dist/$mfe/remoteEntry.js" ]; then
              echo "OK: dist/$mfe/remoteEntry.js exists"
            else
              echo "ERROR: dist/$mfe/remoteEntry.js MISSING"
              exit 1
            fi
          done

          echo "=== Verifying shell dist ==="
          if [ -f "dist/shell/index.html" ]; then
            echo "OK: dist/shell/index.html exists"
          else
            echo "ERROR: dist/shell/index.html MISSING"
            exit 1
          fi

          echo "=== Verifying MFEs in shell dist ==="
          for mfe in admin vendor storefront; do
            if [ -f "dist/shell/$mfe/remoteEntry.js" ]; then
              echo "OK: dist/shell/$mfe/remoteEntry.js exists"
            else
              echo "ERROR: dist/shell/$mfe/remoteEntry.js MISSING"
              exit 1
            fi
          done

          echo "=== All verifications passed ==="

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v13
        with:
          args: deploy --only hosting --project commercehub-siranjeevis01
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  deploy-mobile-web:
    name: Deploy Mobile Web to Firebase
    runs-on: ubuntu-latest
    environment:
      name: production-mobile
      url: https://commerce-mobile-siranjeevis01.web.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build mobile app
        working-directory: mobile
        run: npx ng build --configuration production

      - name: Deploy mobile to Firebase Hosting
        uses: w9jds/firebase-action@v13
        with:
          args: deploy --only hosting --project commerce-mobile-siranjeevis01 --config firebase.mobile.json
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
