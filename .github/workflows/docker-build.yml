name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all Docker images
        run: |
          docker build -f src/ApiGateway/CommerceHub.Gateway/Dockerfile -t commercehub-gateway .
          for dir in src/Services/*/; do
            name=$(basename "$dir")
            docker build -f "${dir}${name}.Api/Dockerfile" -t "commercehub-${name,,}" .
          done
