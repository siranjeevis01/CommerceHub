name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend Build & Test
  # ---------------------------------------------------------------------------
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["10.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CommerceHub.slnx

      - name: Build
        run: dotnet build CommerceHub.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test CommerceHub.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFilePath=TestResults/test-results.trx"

      - name: Publish backend
        run: dotnet publish CommerceHub.slnx --configuration Release --no-build --output ./publish

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: ./publish
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Frontend Build (4 MFEs)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Angular builds
        uses: actions/cache@v4
        with:
          path: |
            frontend/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build all MFEs
        working-directory: frontend
        run: npm run build:all
        env:
          NODE_ENV: production

      - name: Verify build outputs
        working-directory: frontend
        run: |
          echo "--- Verifying build outputs ---"
          for mfe in shell admin vendor storefront; do
            if [ -d "dist/$mfe" ]; then
              echo "OK: dist/$mfe exists"
            else
              echo "ERROR: dist/$mfe missing"
              exit 1
            fi
          done

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          path: frontend/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Deploy Frontend to Firebase (push to main only)
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://commercehub.web.app

    steps:
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifacts
          path: frontend/dist/

      - name: List downloaded artifacts
        run: find frontend/dist/ -maxdepth 2 -type d | head -20

      - name: Setup Firebase CLI
        uses: firebase-actions/setup-firebase@v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
