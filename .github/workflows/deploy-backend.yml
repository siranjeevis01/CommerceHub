name: Deploy Backend

# ============================================================================
# NOTE: This workflow is a placeholder/documentation file.
#
# Render.com is configured to auto-deploy on every push to the `main` branch.
# No manual GitHub Actions deployment is needed for the backend.
#
# How Render auto-deploy works:
#   1. Push to `main` triggers Render's webhook
#   2. Render pulls the latest code, runs `dotnet publish`, and redeploys
#   3. No GitHub secrets or Actions required for backend deployment
#
# If you need to trigger a manual redeploy:
#   - Go to Render Dashboard > CommerceHub API > Manual Deploy > Clear cache & deploy
#
# If you need to switch to GitHub Actions for backend deployment in the future,
# uncomment and configure the job below.
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CommerceHub.slnx"
      - "*.csproj"
      - "Directory.Build.props"
      - "Directory.Packages.props"

