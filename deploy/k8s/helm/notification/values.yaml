replicaCount: 3
image:
  repository: ghcr.io/commercehub/commercehub/notification-service
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
env:
  ASPNETCORE_ENVIRONMENT: Production
envFromSecrets:
  - TWILIO_ACCOUNT_SID
  - TWILIO_AUTH_TOKEN
  - TWILIO_PHONE_NUMBER
  - SMTP_HOST
  - SMTP_PORT
  - SMTP_USER
  - SMTP_PASS
  - WHATSAPP_PHONE_NUMBER_ID
  - WHATSAPP_ACCESS_TOKEN
envFromConfigMap:
  - RABBITMQ_HOST
  - REDIS_CONNECTION_STRING
  - SEQ_URL
  - OTLP_EXPORTER_ENDPOINT
resources:
  requests: { memory: "256Mi", cpu: "250m" }
  limits: { memory: "512Mi", cpu: "500m" }
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
podDisruptionBudget:
  enabled: true
  minAvailable: 2
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [notification]
          topologyKey: kubernetes.io/hostname
