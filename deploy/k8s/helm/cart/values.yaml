replicaCount: 3
image:
  repository: ghcr.io/commercehub/commercehub/cart-service
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
env:
  ASPNETCORE_ENVIRONMENT: Production
envFromSecrets: []
envFromConfigMap:
  - RABBITMQ_HOST
  - REDIS_CONNECTION_STRING
  - SEQ_URL
  - OTLP_EXPORTER_ENDPOINT
resources:
  requests: { memory: "128Mi", cpu: "100m" }
  limits: { memory: "256Mi", cpu: "250m" }
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
podDisruptionBudget:
  enabled: true
  minAvailable: 1
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [cart]
          topologyKey: kubernetes.io/hostname
