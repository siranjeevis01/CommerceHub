replicaCount: 3
image:
  repository: ghcr.io/commercehub/commercehub/gateway
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.commercehub.com
      paths:
        - /
  tls:
    - secretName: commercehub-tls
env:
  ASPNETCORE_ENVIRONMENT: Production
  JWT_ISSUER: CommerceHub
  JWT_AUDIENCE: CommerceHubClient
envFromSecrets:
  - JWT_KEY
envFromConfigMap:
  - SEQ_URL
  - OTLP_EXPORTER_ENDPOINT
resources:
  requests: { memory: "256Mi", cpu: "250m" }
  limits: { memory: "512Mi", cpu: "500m" }
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
podDisruptionBudget:
  enabled: true
  minAvailable: 2
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [gateway]
          topologyKey: kubernetes.io/hostname
